
- name: Deploy to Tomcat
  hosts: web
  become: yes

  tasks:
    - name: Copy WAR file to Tomcat
      copy:
        src: /var/snap/jenkins/current/workspace/tomcat-project/target/MavenAnsibleWebApp.war
        dest: /opt/tomcat/webapps/MavenAnsibleWebApp.war
        remote_src: no

    - name: Restart Tomcat
      service:
        name: tomcat
        state: restarted

